<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подача заявки</title>
    <!-- Подключаем стили и скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); padding: 15px; margin: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: var(--tg-theme-secondary-bg-color, #f4f4f5); color: var(--tg-theme-text-color, #000000); }
        .btn { background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #ffffff); padding: 12px; border: none; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Новая заявка</h2>
    <form id="orderForm">
        <div class="form-group">
            <label>Номер разрешения:</label>
            <input type="text" id="permit_num" required maxlength="30">
        </div>
        <div class="form-group">
            <label>Организация / ФИО:</label>
            <input type="text" id="org_fio" required maxlength="80">
        </div>
        <div class="form-group">
            <label>Номер телефона:</label>
            <input type="tel" id="phone" placeholder="+375... или 80..." required>
        </div>
        <div class="form-group">
            <label>Адрес раскопки:</label>
            <input type="text" id="address" required maxlength="100">
        </div>
        <div class="form-group">
            <label>Дата встречи:</label>
            <input type="date" id="meeting_date" required>
        </div>
        <div class="form-group">
            <label>Время встречи (с 10:00 до 15:00):</label>
            <select id="meeting_time" required>
                <option value="10:00">10:00</option>
                <option value="11:00">11:00</option>
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
            </select>
        </div>
        <div class="form-group">
            <label>Комментарий:</label>
            <textarea id="comment" rows="3" maxlength="200"></textarea>
        </div>
        <button type="submit" class="btn">Отправить заявку</button>
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран

        // Блокируем прошлые даты в календаре
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('meeting_date').setAttribute('min', today);

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Валидация телефона на стороне клиента
            let phone = document.getElementById('phone').value.trim().replace(/\s+/g, '');
            if (!phone.startsWith('+375') && !phone.startswith('80')) {
                alert('Неверный формат телефона! Используйте +375... или 80...');
                return;
            }

            // Формируем объект с данными
            const data = {
                permit_num: document.getElementById('permit_num').value,
                org_fio: document.getElementById('org_fio').value,
                phone: phone,
                address: document.getElementById('address').value,
                meeting_date: document.getElementById('meeting_date').value, // Прилетит ГГГГ-ММ-ДД
                meeting_time: document.getElementById('meeting_time').value,
                comment: document.getElementById('comment').value || '-'
            };

            // Отправляем данные обратно в бота и закрываем форму
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
